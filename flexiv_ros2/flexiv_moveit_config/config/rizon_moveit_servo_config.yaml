###############################################
# Modify all parameters related to servoing here
###############################################
use_gazebo: false # Whether the robot is started in a Gazebo simulation environment

## Properties of incoming commands
# CHANGE: Set to "speed_units" so the controller executes the exact m/s calculated by your PBVS math
command_in_type: "speed_units" 

scale:
  # Scale parameters are only used if command_in_type=="unitless"
  linear:  1.0  
  rotational:  0.9 
  joint: 0.9

# Optionally override Servo's internal velocity scaling when near singularity or collision (0.0 = use internal velocity scaling)
override_velocity_scaling_factor : 1.0 # valid range [0.0:1.0]

## Properties of outgoing commands
# CHANGE: Matched to Flexiv's 250Hz hardware loop for ultra-low latency
publish_period: 0.004  
low_latency_mode: true  

# What type of topic does your robot driver expect?
# CHANGE: Switched to Float64MultiArray to bypass trajectory splining completely
command_out_type: std_msgs/Float64MultiArray

# What to publish? 
# CHANGE: The joint_group_position_controller only accepts an array of positions
publish_joint_positions: true
publish_joint_velocities: false
publish_joint_accelerations: false

## Plugins for smoothing outgoing commands
# Kept as Butterworth to prevent Humble pluginlib crash. It will smooth the final positions cleanly.
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
# lowpass_filter_coeff: 0.0 # The lower the number, the smoother the output (but more laggy). Valid range [0.0:1.0]

# If is_primary_planning_scene_monitor is set to true, the Servo server's PlanningScene advertises the /get_planning_scene service.
is_primary_planning_scene_monitor: true

## MoveIt properties
move_group_name:  $(var robot_sn)_arm  
planning_frame: $(var robot_sn)_base_link 

## Other frames
ee_frame_name: $(var robot_sn)_flange  
robot_link_command_frame:  $(var robot_sn)_flange  

## Stopping behaviour
# CHANGE: Increased to 0.2s buffer so the ArUco node's deadband doesn't trigger false error halts
incoming_command_timeout:  0.2  
num_outgoing_halt_msgs_to_publish: 4

## Configure handling of singularities and joint limits
lower_singularity_threshold:  30.0  
hard_stop_singularity_threshold: 40.0 
joint_limit_margin: 0.2 
leaving_singularity_threshold_multiplier: 2.0 

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds  
joint_command_in_topic: ~/delta_joint_cmds 
joint_topic: /joint_states
status_topic: ~/status 

# CHANGE: Pointed to the new joint group position controller's incoming topic
command_out_topic: /joint_group_position_controller/commands 

## Collision checking for the entire robot body
# CHANGE: Turned ON for safety during camera-driven movement
check_collisions: true 
collision_check_rate: 3.0 
self_collision_proximity_threshold: 0.01 
scene_collision_proximity_threshold: 0.02