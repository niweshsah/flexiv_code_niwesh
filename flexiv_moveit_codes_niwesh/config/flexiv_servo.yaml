moveit_servo:
  ros__parameters:
    use_gazebo: false # Running on the physical robot hardware environment

    ## Properties of incoming commands
    # Changed to speed_units because the PBVS node generates absolute m/s and rad/s values
    command_in_type: "speed_units" 
    scale:
      linear: 0.25      # Safety boundary limit capping max linear translation [m/s]
      rotational: 0.6   # Safety boundary limit capping max angular rotation [rad/s]
      joint: 0.5

    ## Properties of outgoing commands
    publish_period: 0.02  # Runs the internal kinematic solver loop at a stable 50Hz
    low_latency_mode: false

    # Streaming trajectory structure required by the flexiv controller
    command_out_type: trajectory_msgs/JointTrajectory

    # What to publish to the robot driver joint interface
    publish_joint_positions: false
    publish_joint_velocities: true
    publish_joint_accelerations: false

    ## Plugins for smoothing outgoing commands
    smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

    # Set to false because flexiv_bringup's move_group node maintains the primary planning scene
    is_primary_planning_scene_monitor: false

    ## MoveIt properties calibrated to your custom Rizon4s macro parameters
    move_group_name: "Rizon4s-063387_arm"        # Match the macro expanded tracking group name
    planning_frame: "Rizon4s-063387_base_link"   # Core frame reference point for kinematics

    ## Coordinate link associations
    ee_frame_name: "Rizon4s-063387_flange"       # Kinematic tip link matching macro definition
    robot_link_command_frame: "Rizon4s-063387_base_link" # Twist reference frame index

    ## Stopping behaviour watchdogs
    incoming_command_timeout: 0.1  # Safe cutoff if the PBVS loop drops frames for > 100ms
    num_outgoing_halt_msgs_to_publish: 4

    ## Configure handling of singularities and joint limits
    lower_singularity_threshold: 17.0  
    hard_stop_singularity_threshold: 30.0 
    joint_limit_margin: 0.1 
    leaving_singularity_threshold_multiplier: 2.0 

    ## Cleaned topic interfaces matching your system layout
    cartesian_command_in_topic: "~/delta_twist_cmds"  # Resolved relative path
    joint_command_in_topic: "~/delta_joint_cmds"
    joint_topic: /joint_states
    status_topic: ~/status 
    command_out_topic: "/joint_trajectory_controller/joint_trajectory" # Direct driver control lane

    ## Real-time safety collision processing profiles
    check_collisions: false 
    collision_check_rate: 10.0 # [Hz]
    self_collision_proximity_threshold: 0.01 # Buffer distance boundary [m]
    scene_collision_proximity_threshold: 0.02 # Buffer distance boundary [m]