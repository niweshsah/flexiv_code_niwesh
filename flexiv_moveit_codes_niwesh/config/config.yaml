pbvs_controller:
  ros__parameters:
    move_group_name: "Rizon4s-063387_arm"
    base_frame: "Rizon4s-063387_base_link"  # Matches your live /tf topic
    ee_frame: "Rizon4s-063387_flange"        # Your physical flange link
    
    # --- State Machine Configuration ---
    target_timeout_sec: 0.5
    continue_to_last_known_target: true     # Safely tracks the last resolved pose if occluded
    
    # --- Tuning Gains & Speed Safety Caps ---
    gain_translation: 2.5                   # Increased from 1.5. Makes the arm accelerate faster when far away.
    gain_rotation: 1.5                      # Increased from 1.0. Snaps the rotation into place faster.
    max_translation_vel: 0.35               # Increased to 35 cm/s. The physical speed limit.
    max_rotation_vel: 0.8                   # Increased to 0.8 rad/s.
    
    deadband_translation: 0.003             
    deadband_rotation: 0.008                
    smoothing_alpha: 0.20                   # Slightly increased from 0.15 to allow faster response to sudden movements