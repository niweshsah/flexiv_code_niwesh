pbvs_controller:
  ros__parameters:
    move_group_name: "Rizon4s-063387_arm"
    base_frame: "Rizon4s-063387_base_link"  # Matches your live /tf topic
    ee_frame: "Rizon4s-063387_flange"        # Your physical flange link
    
    # --- State Machine Configuration ---
    target_timeout_sec: 0.5
    continue_to_last_known_target: true     # Safely tracks the last resolved pose if occluded
    
    # --- Tuning Gains & Speed Safety Caps ---
    gain_translation: 1.5                   # Slightly lowered from 2.5 for initial safety testing
    gain_rotation: 1.0                      # Slightly lowered from 1.5 for initial safety testing
    max_translation_vel: 0.15               # Capped at 15 cm/s for safety during initial trials
    max_rotation_vel: 0.4                   # Capped at 0.4 rad/s 
    
    # --- Noise Mitigation & Stability ---
    deadband_translation: 0.003             # 3mm deadband to suppress vision jitter
    deadband_rotation: 0.008                # ~0.5 degree orientation deadband
    smoothing_alpha: 0.15                   # Exponential moving average filter weight